<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>十二生肖</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #1a0a00;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: "Microsoft YaHei", "SimHei", sans-serif;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            width: 100vw;
            max-width: 1600px;
            aspect-ratio: 16 / 9;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        #menu-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a0a00 0%, #3d1a00 50%, #1a0a00 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        #menu-overlay h1 {
            font-size: 4.5rem;
            color: #f5c842;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 30px rgba(245,200,66,0.5), 2px 2px 0 #8B4500;
            letter-spacing: 0.2em;
        }

        #menu-overlay .subtitle {
            font-size: 1rem;
            color: #c8906a;
            margin-bottom: 3.5rem;
            letter-spacing: 0.3em;
        }

        .menu-btn {
            font-size: 1.6rem;
            color: #f5c842;
            background: rgba(139, 69, 0, 0.3);
            border: 2px solid #c8906a;
            padding: 0.9rem 3rem;
            margin: 0.6rem;
            cursor: pointer;
            transition: all 0.25s;
            font-family: inherit;
            letter-spacing: 0.1em;
            border-radius: 4px;
        }

        .menu-btn:hover {
            background: rgba(245, 200, 66, 0.15);
            border-color: #f5c842;
            box-shadow: 0 0 20px rgba(245,200,66,0.3);
            transform: translateY(-2px);
        }

        #info-panel {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 230px;
            padding: 15px;
            background-color: rgba(20, 8, 0, 0.88);
            border: 1px solid #8B5E30;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.9;
            display: none;
            z-index: 5;
            color: #e8d0a0;
        }

        #info-panel .label {
            font-weight: bold;
            color: #f5c842;
        }

        #info-panel hr {
            border-color: #5c3317;
        }

        #status-bar {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            padding: 8px 20px;
            background-color: rgba(0, 0, 0, 0.8);
            color: #f5c842;
            border: 1px solid #8B5E30;
            border-radius: 20px;
            font-size: 14px;
            display: none;
            z-index: 5;
        }

        #winner-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.75);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            cursor: pointer;
        }

        #winner-overlay h2 {
            font-size: 3.5rem;
            color: #f5c842;
            margin-bottom: 1rem;
            text-shadow: 0 0 40px rgba(245,200,66,0.7);
        }

        #winner-overlay p {
            font-size: 1.2rem;
            color: #c8906a;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas"></canvas>

        <div id="menu-overlay">
            <h1>十二生肖</h1>
            <div class="subtitle">暗棋对弈</div>
            <button class="menu-btn" onclick="startGame('pvp')">双人对战</button>
            <button class="menu-btn" onclick="startGame('pve')">单人 对战 AI</button>
        </div>

        <div id="info-panel">
            <div><span class="label">当前回合：</span><span id="info-player">-</span></div>
            <div><span class="label">模式：</span><span id="info-mode">-</span></div>
            <div><span class="label">回合数：</span><span id="info-moves">0</span></div>
            <div><span class="label">红方棋子：</span><span id="info-red">12</span></div>
            <div><span class="label">黑方棋子：</span><span id="info-black">12</span></div>
            <hr style="margin: 8px 0;">
            <div id="info-message">请点击一个棋子</div>
        </div>

        <div id="status-bar"></div>

        <div id="winner-overlay" onclick="backToMenu()">
            <h2 id="winner-text"></h2>
            <p>点击任意处返回菜单</p>
        </div>
    </div>

    <script>
        const BOARD_ROWS = 6;
        const BOARD_COLS = 4;
        const CELL_W = 225;
        const CELL_H = 225;
        const BOARD_W = CELL_W * BOARD_ROWS;
        const BOARD_H = CELL_H * BOARD_COLS;

        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = 1600;
        canvas.height = 900;

        let ws = null;
        let gameState = null;
        let selectedPos = null;
        let gameMode = null;

        // Animation state
        let moveAnimation = null;
        let vanishAnimations = [];
        let flipAnimations = [];
        let pendingAction = null;
        const MOVE_DURATION = 320;
        const VANISH_DURATION = 420;
        const FLIP_DURATION = 400;

        // ── Canvas drawing functions ────────────────────────────────────────

        function drawBoardCanvas() {
            // Background: warm linen gradient
            const bg = ctx.createLinearGradient(0, 0, BOARD_W, BOARD_H);
            bg.addColorStop(0,   '#f0dfa8');
            bg.addColorStop(0.3, '#e8d090');
            bg.addColorStop(0.7, '#dfc078');
            bg.addColorStop(1,   '#cfa860');
            ctx.fillStyle = bg;
            ctx.fillRect(0, 0, BOARD_W, BOARD_H);

            // Subtle wood-grain stripes
            ctx.save();
            ctx.globalAlpha = 0.06;
            for (let i = 0; i < BOARD_H; i += 7) {
                ctx.fillStyle = (Math.floor(i / 7) % 2 === 0) ? '#6b3a10' : '#fff';
                ctx.fillRect(0, i, BOARD_W, 3);
            }
            ctx.restore();

            // Outer decorative frame
            ctx.strokeStyle = '#4a2508';
            ctx.lineWidth = 10;
            ctx.strokeRect(5, 5, BOARD_W - 10, BOARD_H - 10);

            // Inner frame line
            ctx.strokeStyle = '#8b5e30';
            ctx.lineWidth = 2.5;
            ctx.strokeRect(20, 20, BOARD_W - 40, BOARD_H - 40);

            // Grid lines
            ctx.strokeStyle = '#7a5228';
            ctx.lineWidth = 1.5;
            for (let x = 0; x <= BOARD_ROWS; x++) {
                ctx.beginPath();
                ctx.moveTo(x * CELL_W, 0);
                ctx.lineTo(x * CELL_W, BOARD_H);
                ctx.stroke();
            }
            for (let y = 0; y <= BOARD_COLS; y++) {
                ctx.beginPath();
                ctx.moveTo(0, y * CELL_H);
                ctx.lineTo(BOARD_W, y * CELL_H);
                ctx.stroke();
            }

            // Intersection ornaments
            for (let x = 0; x <= BOARD_ROWS; x++) {
                for (let y = 0; y <= BOARD_COLS; y++) {
                    const ix = x * CELL_W;
                    const iy = y * CELL_H;
                    ctx.beginPath();
                    ctx.arc(ix, iy, 5, 0, Math.PI * 2);
                    ctx.fillStyle = '#4a2508';
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(ix, iy, 3, 0, Math.PI * 2);
                    ctx.fillStyle = '#c8903c';
                    ctx.fill();
                }
            }

            // Faint cell center circles
            ctx.save();
            ctx.globalAlpha = 0.08;
            ctx.strokeStyle = '#5c3317';
            ctx.lineWidth = 1;
            for (let x = 0; x < BOARD_ROWS; x++) {
                for (let y = 0; y < BOARD_COLS; y++) {
                    ctx.beginPath();
                    ctx.arc(x * CELL_W + CELL_W / 2, y * CELL_H + CELL_H / 2, CELL_W * 0.38, 0, Math.PI * 2);
                    ctx.stroke();
                }
            }
            ctx.restore();
        }

        function drawPieceDropShadow(cx, cy, r) {
            ctx.save();
            ctx.globalAlpha = (ctx.globalAlpha || 1) * 0.35;
            ctx.beginPath();
            ctx.arc(cx + 4, cy + 6, r, 0, Math.PI * 2);
            ctx.fillStyle = '#000';
            ctx.fill();
            ctx.restore();
        }

        function drawPieceBackCanvas(cx, cy, r) {
            drawPieceDropShadow(cx, cy, r);

            // Main circle – deep indigo
            const grad = ctx.createRadialGradient(cx - r * 0.3, cy - r * 0.3, r * 0.05, cx, cy, r);
            grad.addColorStop(0, '#5c6bc0');
            grad.addColorStop(0.6, '#283593');
            grad.addColorStop(1, '#1a237e');
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI * 2);
            ctx.fillStyle = grad;
            ctx.fill();

            // Edge highlight
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(120,140,220,0.4)';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Gold decorative ring
            ctx.beginPath();
            ctx.arc(cx, cy, r * 0.82, 0, Math.PI * 2);
            ctx.strokeStyle = '#ffd700';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Four small gold dots on the ring
            const dotR = r * 0.82;
            ctx.fillStyle = '#ffd700';
            for (let i = 0; i < 4; i++) {
                const angle = (i * Math.PI) / 2;
                ctx.beginPath();
                ctx.arc(cx + dotR * Math.cos(angle), cy + dotR * Math.sin(angle), 3.5, 0, Math.PI * 2);
                ctx.fill();
            }

            // Question mark
            ctx.fillStyle = '#ffd700';
            ctx.font = `bold ${Math.round(r * 0.75)}px "SimHei", "Microsoft YaHei", sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('？', cx, cy + 2);
        }

        function drawPieceFrontCanvas(cx, cy, r, piece) {
            const isRed = piece.camp === 'red';
            drawPieceDropShadow(cx, cy, r);

            // Main circle
            const grad = ctx.createRadialGradient(cx - r * 0.3, cy - r * 0.3, r * 0.05, cx, cy, r);
            if (isRed) {
                grad.addColorStop(0, '#ef6c6c');
                grad.addColorStop(0.55, '#c62828');
                grad.addColorStop(1, '#7f0000');
            } else {
                grad.addColorStop(0, '#616161');
                grad.addColorStop(0.55, '#1c1c1c');
                grad.addColorStop(1, '#000000');
            }
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI * 2);
            ctx.fillStyle = grad;
            ctx.fill();

            // Edge highlight
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI * 2);
            ctx.strokeStyle = isRed ? 'rgba(255,160,160,0.45)' : 'rgba(180,180,180,0.3)';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Decorative inner ring
            ctx.beginPath();
            ctx.arc(cx, cy, r * 0.82, 0, Math.PI * 2);
            ctx.strokeStyle = isRed ? 'rgba(255,220,160,0.55)' : 'rgba(200,200,200,0.4)';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Character
            ctx.fillStyle = isRed ? '#ffe082' : '#eeeeee';
            ctx.font = `bold ${Math.round(r * 0.72)}px "SimHei", "Microsoft YaHei", sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(piece.name, cx, cy + 2);
        }

        function drawMonkeyCanvas(cx, cy, r, monkey) {
            const isRed = monkey.camp === 'red';
            drawPieceDropShadow(cx, cy, r);

            // Main circle – warm brown
            const grad = ctx.createRadialGradient(cx - r * 0.3, cy - r * 0.3, r * 0.05, cx, cy, r);
            grad.addColorStop(0, '#a1887f');
            grad.addColorStop(0.6, '#6d4c41');
            grad.addColorStop(1, '#3e2723');
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI * 2);
            ctx.fillStyle = grad;
            ctx.fill();

            // Edge
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(200,160,100,0.4)';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Dashed amber ring (monkey marker)
            ctx.save();
            ctx.beginPath();
            ctx.arc(cx, cy, r * 0.83, 0, Math.PI * 2);
            ctx.strokeStyle = '#ffb300';
            ctx.lineWidth = 3;
            ctx.setLineDash([7, 6]);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.restore();

            // Character
            ctx.fillStyle = isRed ? '#ff8a65' : '#e0e0e0';
            ctx.font = `bold ${Math.round(r * 0.72)}px "SimHei", "Microsoft YaHei", sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(monkey.name, cx, cy + 2);
        }

        function drawPieceAt(cx, cy, r, piece, revealed, monkey) {
            if (monkey) {
                drawMonkeyCanvas(cx, cy, r, monkey);
            } else if (revealed && piece) {
                drawPieceFrontCanvas(cx, cy, r, piece);
            } else {
                drawPieceBackCanvas(cx, cy, r);
            }
        }

        // ── WebSocket & game logic ──────────────────────────────────────────

        function connectWebSocket() {
            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${location.host}/ws`);

            ws.onopen = () => {
                console.log('Connected to server');
            };

            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                handleMessage(msg);
            };

            ws.onclose = () => {
                console.log('Disconnected from server');
                setTimeout(connectWebSocket, 2000);
            };

            ws.onerror = (err) => {
                console.error('WebSocket error:', err);
            };
        }

        function handleMessage(msg) {
            switch (msg.type) {
                case 'game_started':
                    gameState = msg.data;
                    gameMode = msg.data.mode;
                    selectedPos = null;
                    document.getElementById('menu-overlay').style.display = 'none';
                    document.getElementById('info-panel').style.display = 'block';
                    document.getElementById('status-bar').style.display = 'block';
                    document.getElementById('winner-overlay').style.display = 'none';
                    updateInfoPanel();
                    render();
                    break;

                case 'board_update': {
                    const oldBoard = gameState.board;
                    const newBoard = msg.data.board;

                    if (pendingAction) {
                        if (pendingAction.type === 'flip') {
                            const { x, y } = pendingAction;
                            flipAnimations.push({
                                x, y,
                                piece: newBoard.cells[x][y].piece,
                                startTime: Date.now()
                            });
                        } else if (pendingAction.type === 'move') {
                            const { from_x, from_y, to_x, to_y } = pendingAction;
                            const oldSrc = oldBoard.cells[from_x][from_y];
                            const oldDst = oldBoard.cells[to_x][to_y];
                            const newSrc = newBoard.cells[from_x][from_y];
                            const newDst = newBoard.cells[to_x][to_y];
                            const srcNowEmpty = !newSrc.has_piece && !newSrc.monkey;
                            const dstNowEmpty = !newDst.has_piece && !newDst.monkey;

                            if (srcNowEmpty && dstNowEmpty) {
                                vanishAnimations.push({ x: from_x, y: from_y, piece: oldSrc.piece, monkey: oldSrc.monkey, startTime: Date.now() });
                                vanishAnimations.push({ x: to_x, y: to_y, piece: oldDst.piece, monkey: oldDst.monkey, startTime: Date.now() });
                            } else if (srcNowEmpty && !dstNowEmpty) {
                                if (oldDst.has_piece || oldDst.monkey) {
                                    vanishAnimations.push({ x: to_x, y: to_y, piece: oldDst.piece, monkey: oldDst.monkey, startTime: Date.now() });
                                }
                                moveAnimation = {
                                    startX: from_x, startY: from_y,
                                    endX: to_x, endY: to_y,
                                    piece: oldSrc.piece,
                                    monkey: oldSrc.monkey,
                                    startTime: Date.now()
                                };
                            } else if (!srcNowEmpty && dstNowEmpty) {
                                vanishAnimations.push({ x: to_x, y: to_y, piece: oldDst.piece, monkey: oldDst.monkey, startTime: Date.now() });
                            }
                        }
                        pendingAction = null;
                    }

                    gameState.board = newBoard;
                    gameState.current_player = msg.data.current_player;
                    gameState.move_count = msg.data.move_count;
                    selectedPos = null;
                    if (msg.data.message) {
                        document.getElementById('info-message').textContent = msg.data.message;
                    }
                    updateInfoPanel();
                    if (!moveAnimation && vanishAnimations.length === 0 && flipAnimations.length === 0) render();
                    break;
                }

                case 'game_over':
                    gameState.board = msg.data.board;
                    const winner = msg.data.winner === 'red' ? '红方' : '黑方';
                    document.getElementById('winner-text').textContent = `${winner}获胜！`;
                    document.getElementById('winner-overlay').style.display = 'flex';
                    render();
                    break;

                case 'ai_thinking':
                    document.getElementById('status-bar').textContent = 'AI 思考中...';
                    break;

                case 'ai_action':
                    document.getElementById('status-bar').textContent = '';
                    document.getElementById('info-message').textContent = msg.data.description;
                    if (msg.data.action_type === 'flip') {
                        pendingAction = { type: 'flip', x: msg.data.from_x, y: msg.data.from_y };
                    } else if (msg.data.action_type === 'move') {
                        pendingAction = { type: 'move', from_x: msg.data.from_x, from_y: msg.data.from_y, to_x: msg.data.to_x, to_y: msg.data.to_y };
                    }
                    break;

                case 'error':
                    pendingAction = null;
                    console.warn('Server error:', msg.data.message);
                    break;
            }
        }

        function startGame(mode) {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                alert('未连接到服务器，请稍候...');
                return;
            }
            ws.send(JSON.stringify({ type: 'new_game', data: { mode } }));
        }

        function backToMenu() {
            document.getElementById('winner-overlay').style.display = 'none';
            document.getElementById('menu-overlay').style.display = 'flex';
            document.getElementById('info-panel').style.display = 'none';
            document.getElementById('status-bar').style.display = 'none';
            gameState = null;
            selectedPos = null;
            ctx.fillStyle = '#1a0a00';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function updateInfoPanel() {
            if (!gameState) return;
            const player = gameState.current_player === 'red' ? '红方' : '黑方';
            const mode = gameMode === 'pve' ? '单人（你=黑方, AI=红方）' : '双人对战';
            document.getElementById('info-player').textContent = player;
            document.getElementById('info-mode').textContent = mode;
            document.getElementById('info-moves').textContent = gameState.move_count || 0;

            let redCount = 0, blackCount = 0;
            if (gameState.board && gameState.board.cells) {
                for (let x = 0; x < 6; x++) {
                    for (let y = 0; y < 4; y++) {
                        const cell = gameState.board.cells[x][y];
                        if (cell.piece) {
                            if (cell.piece.camp === 'red') redCount++;
                            else blackCount++;
                        }
                        if (cell.monkey) {
                            if (cell.monkey.camp === 'red') redCount++;
                            else blackCount++;
                        }
                    }
                }
            }
            document.getElementById('info-red').textContent = redCount;
            document.getElementById('info-black').textContent = blackCount;
        }

        function gridToPixel(x, y) {
            return [x * CELL_W, y * CELL_H];
        }

        function pixelToGrid(px, py) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const x = Math.floor((px - rect.left) * scaleX / CELL_W);
            const y = Math.floor((py - rect.top) * scaleY / CELL_H);
            if (x >= 0 && x < 6 && y >= 0 && y < 4) return [x, y];
            return null;
        }

        function renderPiece(x, y, piece, revealed, monkey, alpha, yOffset = 0) {
            const [px, py] = gridToPixel(x, y);
            const pw = CELL_W - 10;
            const ph = CELL_H - 10;
            const cx = px + 5 + pw / 2;
            const cy = py + 5 + yOffset + ph / 2;
            const r = Math.min(pw, ph) / 2 - 6;

            ctx.save();
            if (alpha !== undefined) ctx.globalAlpha = alpha;
            drawPieceAt(cx, cy, r, piece, revealed, monkey);
            ctx.restore();
        }

        function render() {
            // Dark border area
            ctx.fillStyle = '#1a0a00';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw board
            drawBoardCanvas();

            if (!gameState || !gameState.board) return;

            const cells = gameState.board.cells;

            // Draw pieces
            for (let x = 0; x < 6; x++) {
                for (let y = 0; y < 4; y++) {
                    const cell = cells[x][y];
                    if (cell.has_piece || cell.monkey) {
                        if (moveAnimation && moveAnimation.endX === x && moveAnimation.endY === y) continue;
                        if (selectedPos && selectedPos[0] === x && selectedPos[1] === y && !moveAnimation) continue;
                        if (flipAnimations.some(a => a.x === x && a.y === y)) continue;
                        renderPiece(x, y, cell.piece, cell.revealed, cell.monkey);
                    }
                }
            }

            // Selected piece – lift + golden ring highlight
            if (selectedPos && !moveAnimation) {
                const [sx, sy] = selectedPos;
                const cell = cells[sx][sy];
                if (cell.has_piece || cell.monkey) {
                    const t = Date.now() / 120;
                    const lift = Math.sin(t) * 4 - 12;
                    const [px, py] = gridToPixel(sx, sy);
                    const pw = CELL_W - 10;
                    const ph = CELL_H - 10;
                    const cx = px + 5 + pw / 2;
                    const cy = py + 5 + lift + ph / 2;
                    const r = Math.min(pw, ph) / 2 - 6;

                    // Drop shadow
                    ctx.save();
                    ctx.globalAlpha = 0.3;
                    ctx.fillStyle = '#000';
                    ctx.beginPath();
                    ctx.ellipse(cx, py + CELL_H - 2, r * 0.7, 9, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();

                    // Pulsing gold glow ring
                    const pulse = (Math.sin(t * 1.8) + 1) / 2;
                    ctx.save();
                    ctx.globalAlpha = 0.5 + pulse * 0.4;
                    ctx.beginPath();
                    ctx.arc(cx, cy, r + 8, 0, Math.PI * 2);
                    ctx.strokeStyle = '#ffd700';
                    ctx.lineWidth = 4;
                    ctx.stroke();
                    ctx.restore();

                    renderPiece(sx, sy, cell.piece, cell.revealed, cell.monkey, undefined, lift);
                }
            }

            // Move animation
            if (moveAnimation) {
                const elapsed = Date.now() - moveAnimation.startTime;
                const progress = Math.min(1.0, elapsed / MOVE_DURATION);
                const eased = 1.0 - (1.0 - progress) * (1.0 - progress);

                const [sx, sy] = gridToPixel(moveAnimation.startX, moveAnimation.startY);
                const [ex, ey] = gridToPixel(moveAnimation.endX, moveAnimation.endY);
                const animX = sx + (ex - sx) * eased;
                const arcOffset = -22 * Math.sin(progress * Math.PI);
                const animY = sy + (ey - sy) * eased + arcOffset;

                const pw = CELL_W - 10;
                const ph = CELL_H - 10;
                const pcx = animX + 5 + pw / 2;
                const pcy = animY + 5 + ph / 2;
                const r = Math.min(pw, ph) / 2 - 6;

                // Shadow beneath
                ctx.save();
                ctx.globalAlpha = 0.28;
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.ellipse(pcx, animY + CELL_H - 2, r * 0.7, 9, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();

                drawPieceAt(pcx, pcy, r, moveAnimation.piece, true, moveAnimation.monkey);

                if (progress >= 1.0) moveAnimation = null;
            }

            // Vanish animations
            vanishAnimations = vanishAnimations.filter(anim => {
                const elapsed = Date.now() - anim.startTime;
                const progress = Math.min(1.0, elapsed / VANISH_DURATION);
                const scale = Math.max(0.05, 1.0 - progress * 0.95);
                const alpha = Math.max(0, 1.0 - progress);

                const [px, py] = gridToPixel(anim.x, anim.y);
                const baseW = CELL_W - 10;
                const baseH = CELL_H - 10;
                const pw = baseW * scale;
                const ph = baseH * scale;
                const ox = px + (baseW - pw) / 2 + 5;
                const oy = py + (baseH - ph) / 2 + 5 - progress * 34;
                const pcx = ox + pw / 2;
                const pcy = oy + ph / 2;
                const r = Math.max(4, Math.min(pw, ph) / 2 - 6 * scale);

                ctx.save();
                ctx.globalAlpha = alpha;
                drawPieceAt(pcx, pcy, r, anim.piece, true, anim.monkey);
                ctx.restore();

                return progress < 1.0;
            });

            // Flip animations (card flip: back → front)
            flipAnimations = flipAnimations.filter(anim => {
                const elapsed = Date.now() - anim.startTime;
                const progress = Math.min(1.0, elapsed / FLIP_DURATION);

                const [px, py] = gridToPixel(anim.x, anim.y);
                const pw = CELL_W - 10;
                const ph = CELL_H - 10;
                const cx = px + 5 + pw / 2;
                const cy = py + 5 + ph / 2;
                const r = Math.min(pw, ph) / 2 - 6;

                let scaleX, showFront;
                if (progress < 0.5) {
                    scaleX = 1 - progress * 2;
                    showFront = false;
                } else {
                    scaleX = (progress - 0.5) * 2;
                    showFront = true;
                }

                ctx.save();
                ctx.translate(cx, cy);
                ctx.scale(scaleX, 1);
                if (showFront && anim.piece) {
                    drawPieceFrontCanvas(0, 0, r, anim.piece);
                } else {
                    drawPieceBackCanvas(0, 0, r);
                }
                ctx.restore();

                return progress < 1.0;
            });
        }

        function animationLoop() {
            if (gameState) render();
            requestAnimationFrame(animationLoop);
        }

        canvas.addEventListener('click', (e) => {
            if (!gameState || !ws || ws.readyState !== WebSocket.OPEN) return;
            if (moveAnimation || vanishAnimations.length > 0 || flipAnimations.length > 0) return;

            if (gameMode === 'pve' && gameState.current_player === 'red') return;

            const pos = pixelToGrid(e.clientX, e.clientY);
            if (!pos) return;

            const [x, y] = pos;
            const cell = gameState.board.cells[x][y];

            if (!selectedPos) {
                if (cell.has_piece && !cell.revealed && !cell.monkey) {
                    pendingAction = { type: 'flip', x, y };
                    ws.send(JSON.stringify({ type: 'flip', data: { x, y } }));
                } else if ((cell.piece && cell.revealed && cell.piece.camp === gameState.current_player) ||
                           (cell.monkey && cell.monkey.camp === gameState.current_player)) {
                    const pieceName = cell.monkey ? cell.monkey.name : cell.piece.name;
                    selectedPos = [x, y];
                    document.getElementById('info-message').textContent = `已选中 ${pieceName}`;
                    render();
                }
            } else {
                const [sx, sy] = selectedPos;
                pendingAction = { type: 'move', from_x: sx, from_y: sy, to_x: x, to_y: y };
                ws.send(JSON.stringify({ type: 'move', data: { from_x: sx, from_y: sy, to_x: x, to_y: y } }));
                selectedPos = null;
            }
        });

        canvas.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            selectedPos = null;
            document.getElementById('info-message').textContent = '请点击一个棋子';
            render();
        });

        function init() {
            connectWebSocket();
            animationLoop();
        }

        init();
    </script>
</body>
</html>
